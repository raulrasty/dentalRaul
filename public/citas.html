<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DentalRaúl – Citas</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/citas.css">
</head>
<body>

  <div id="header-placeholder"></div>
  <div id="sidebar-placeholder"></div>

  <div class="app-layout">
    <main class="main-content">

      <div class="flex-between mb-2">
        <div class="page-title">Citas</div>
        <button class="btn btn-primary" id="btn-nueva-cita">+ Nueva cita</button>
      </div>

      <!-- Filtros -->
      <div class="filtros mb-2">
        <input type="date" id="filtro-fecha">
        <select id="filtro-estado">
          <option value="">Todos los estados</option>
          <option value="pendiente">Pendiente</option>
          <option value="confirmada">Confirmada</option>
          <option value="en_espera">En sala de espera</option>
          <option value="en_consulta">En consulta</option>
          <option value="completada">Completada</option>
          <option value="cancelada">Cancelada</option>
        </select>
        <select id="filtro-especialidad">
          <option value="">Todas las especialidades</option>
          <option value="Odontología general">Odontología general</option>
          <option value="Ortodoncia">Ortodoncia</option>
          <option value="Endodoncia">Endodoncia</option>
          <option value="Periodoncia">Periodoncia</option>
          <option value="Implantología">Implantología</option>
          <option value="Cirugía oral">Cirugía oral</option>
          <option value="Odontopediatría">Odontopediatría</option>
          <option value="Estética dental">Estética dental</option>
          <option value="Blanqueamiento">Blanqueamiento</option>
          <option value="Urgencia">Urgencia</option>
        </select>
        <button class="btn btn-secondary" id="btn-limpiar-filtros">Limpiar</button>
      </div>

      <!-- Tabla -->
      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Paciente</th>
                <th>Doctor</th>
                <th>Especialidad</th>
                <th>Motivo</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tbody-citas">
              <tr><td colspan="8">
                <div class="empty-state">
                  <div class="empty-state-icon"></div>
                  <p>Cargando citas...</p>
                </div>
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <!-- Modal nueva/editar cita -->
  <div class="modal-overlay" id="modal-cita">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-titulo">Nueva cita</h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div id="modal-alert"></div>
        <input type="hidden" id="cita-id">
        <div class="form-row">
          <div class="form-group">
            <label>Paciente *</label>
            <div class="paciente-buscador-wrapper">
              <input type="text" id="c-paciente-input" class="input-buscador-paciente"
                placeholder="Buscar paciente..." autocomplete="off">
              <input type="hidden" id="c-paciente">
            </div>
          </div>
          <div class="form-group">
            <label>Doctor *</label>
            <select id="c-doctor" required>
              <option value="">Seleccionar doctor...</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Fecha *</label>
            <input type="date" id="c-fecha" required>
          </div>
          <div class="form-group">
            <label>Hora *</label>
            <input type="time" id="c-hora" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Especialidad</label>
            <select id="c-especialidad">
              <option value="">Seleccionar...</option>
              <option value="Odontología general">Odontología general</option>
              <option value="Ortodoncia">Ortodoncia</option>
              <option value="Endodoncia">Endodoncia</option>
              <option value="Periodoncia">Periodoncia</option>
              <option value="Implantología">Implantología</option>
              <option value="Cirugía oral">Cirugía oral</option>
              <option value="Odontopediatría">Odontopediatría</option>
              <option value="Estética dental">Estética dental</option>
              <option value="Blanqueamiento">Blanqueamiento</option>
              <option value="Urgencia">Urgencia</option>
            </select>
          </div>
          <div class="form-group">
            <label>Estado</label>
            <select id="c-estado">
              <option value="pendiente">Pendiente</option>
              <option value="confirmada">Confirmada</option>
              <option value="en_espera"> En sala de espera</option>
              <option value="en_consulta">En consulta</option>
              <option value="completada">Completada</option>
              <option value="cancelada">Cancelada</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Motivo / Notas</label>
          <textarea id="c-motivo" placeholder="Descripción de la consulta..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="btn-cancelar">Cancelar</button>
        <button class="btn btn-primary" id="btn-guardar">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Modal confirmar eliminación -->
  <div class="modal-overlay" id="modal-eliminar">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3>Eliminar cita</h3>
        <button class="modal-close" id="modal-eliminar-close">✕</button>
      </div>
      <div class="modal-body">
        <p>¿Estás seguro de que quieres eliminar esta cita? Esta acción no se puede deshacer.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="btn-cancelar-eliminar">Cancelar</button>
        <button class="btn btn-danger" id="btn-confirmar-eliminar">Eliminar</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/paciente-buscador.js"></script>
  <script src="js/citas.js"></script>
</body>
</html>
