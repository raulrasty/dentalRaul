<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DentalRaúl – Dashboard</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <div id="header-placeholder"></div>
  <div id="sidebar-placeholder"></div>

  <div class="app-layout">
    <main class="main-content">

      <div class="page-title mb-2">Dashboard</div>

      <!-- Tarjetas resumen -->
      <div class="stats-grid mb-2">
        <div class="stat-card">
          <div class="stat-info">
            <span class="stat-label">Total pacientes</span>
            <span class="stat-value" id="total-pacientes">—</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-info">
            <span class="stat-label">Citas hoy</span>
            <span class="stat-value" id="citas-hoy">—</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-info">
            <span class="stat-label">Pagos pendientes</span>
            <span class="stat-value" id="pagos-pendientes">—</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-info">
            <span class="stat-label">Ingresos del mes</span>
            <span class="stat-value" id="ingresos-mes">—</span>
          </div>
        </div>
      </div>

      <!-- Contenido principal -->
      <div class="dashboard-grid">

        <!-- Citas de hoy -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">Citas de hoy</span>
            <a href="/citas.html" class="btn btn-secondary btn-sm">Ver todas</a>
          </div>
          <div id="citas-hoy-list">
            <div class="empty-state">
              <p>No hay citas para hoy</p>
            </div>
          </div>
        </div>

        <!-- Últimos pacientes -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">Últimos pacientes</span>
            <a href="/pacientes.html" class="btn btn-secondary btn-sm">Ver todos</a>
          </div>
          <div id="ultimos-pacientes">
            <div class="empty-state">
              <p>No hay pacientes registrados</p>
            </div>
          </div>
        </div>

        <!-- Pagos pendientes -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">Pagos pendientes</span>
            <a href="/pagos.html" class="btn btn-secondary btn-sm">Ver todos</a>
          </div>
          <div id="pagos-pendientes-list">
            <div class="empty-state">
              <p>No hay pagos pendientes</p>
            </div>
          </div>
        </div>

      </div>

    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/route-guard.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
