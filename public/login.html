<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DentalRaúl – Acceso</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-page">

  <div class="login-wrapper">

    <!-- Panel izquierdo decorativo -->
    <div class="login-brand">
      <div class="brand-content">
        <div class="brand-logo">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="24" fill="white" fill-opacity="0.15"/>
            <path d="M16 14c0-2.2 1.8-4 4-4h8c2.2 0 4 1.8 4 4 0 1.5-.8 2.8-2 3.5V20c0 4.4-3.6 8-8 8s-8-3.6-8-8v-2.5C15.2 16.8 14.4 15.5 14 14h2z" fill="white"/>
            <path d="M18 28.5C14.5 30 12 33.2 12 37h24c0-3.8-2.5-7-6-8.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <h1 class="brand-title">DentalRaúl</h1>
        <p class="brand-subtitle">Sistema de gestión clínica</p>
        <div class="brand-features">
          <div class="brand-feature">
            <span class="feature-icon">👤</span>
            <span>Gestión de pacientes</span>
          </div>
          <div class="brand-feature">
            <span class="feature-icon">📅</span>
            <span>Control de citas</span>
          </div>
          <div class="brand-feature">
            <span class="feature-icon">🦷</span>
            <span>Historial clínico</span>
          </div>
          <div class="brand-feature">
            <span class="feature-icon">💳</span>
            <span>Gestión de pagos</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Panel derecho con formulario -->
    <div class="login-form-panel">
      <div class="login-form-container">
        <h2>Bienvenido</h2>
        <p class="form-subtitle">Introduce tus credenciales para acceder</p>

        <div id="error-msg" class="alert alert-error hidden"></div>
        <div id="success-msg" class="alert alert-success hidden"></div>

        <!-- Login -->
        <form id="login-form">
          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" placeholder="ejemplo@clinica.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="password">Contraseña</label>
            <div class="input-password">
              <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
              <button type="button" id="toggle-password" class="toggle-pw" aria-label="Mostrar contraseña">
                <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <button type="submit" class="btn-submit" id="btn-login">
            <span id="btn-text">Iniciar sesión</span>
            <span id="btn-spinner" class="spinner hidden"></span>
          </button>
        </form>

        <div class="form-divider">
          <span>¿No tienes cuenta?</span>
          <button class="link-btn" id="show-registro">Regístrate aquí</button>
        </div>

        <!-- Registro (oculto por defecto) -->
        <form id="registro-form" class="hidden">
          <div class="form-group">
            <label for="reg-nombre">Nombre completo</label>
            <input type="text" id="reg-nombre" placeholder="Dr. Raúl Álvarez" required>
          </div>
          <div class="form-group">
            <label for="reg-email">Correo electrónico</label>
            <input type="email" id="reg-email" placeholder="ejemplo@clinica.com" required>
          </div>
          <div class="form-group">
            <label for="reg-password">Contraseña</label>
            <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" required>
          </div>
          <button type="submit" class="btn-submit">
            <span>Crear cuenta</span>
          </button>
        </form>

        <div id="toggle-registro" class="form-divider hidden">
          <span>¿Ya tienes cuenta?</span>
          <button class="link-btn" id="show-login">Inicia sesión</button>
        </div>

      </div>
    </div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
