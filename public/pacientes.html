<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DentalRaúl – Pacientes</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pacientes.css">
</head>
<body>

  <div id="header-placeholder"></div>
  <div id="sidebar-placeholder"></div>

  <div class="app-layout">
    <main class="main-content">

      <div class="flex-between mb-2">
        <div class="page-title">Pacientes</div>
        <button class="btn btn-primary" id="btn-nuevo-paciente">
          + Nuevo paciente
        </button>
      </div>

      <!-- Buscador -->
      <div class="search-bar mb-2">
        <input type="text" id="buscador" placeholder="Buscar por nombre, apellidos o DNI...">
        <span class="search-icon"></span>
      </div>

      <!-- Tabla -->
      <div class="card">
        <div class="table-wrapper">
          <table id="tabla-pacientes">
            <thead>
              <tr>
                <th>Paciente</th>
                <th>DNI</th>
                <th>Teléfono</th>
                <th>Email</th>
                <th>F. Nacimiento</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tbody-pacientes">
              <tr>
                <td colspan="6">
                  <div class="empty-state">
                    <div class="empty-state-icon"></div>
                    <p>Cargando pacientes...</p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <!-- Modal nuevo/editar paciente -->
  <div class="modal-overlay" id="modal-paciente">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-titulo">Nuevo paciente</h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div id="modal-alert"></div>
        <input type="hidden" id="paciente-id">
        <div class="form-row">
          <div class="form-group">
            <label>Nombre *</label>
            <input type="text" id="p-nombre" placeholder="Nombre" required>
          </div>
          <div class="form-group">
            <label>Apellidos *</label>
            <input type="text" id="p-apellidos" placeholder="Apellidos" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>DNI</label>
            <input type="text" id="p-dni" placeholder="12345678A">
          </div>
          <div class="form-group">
            <label>Teléfono</label>
            <input type="tel" id="p-telefono" placeholder="600 000 000">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="p-email" placeholder="paciente@email.com">
          </div>
          <div class="form-group">
            <label>Fecha de nacimiento</label>
            <input type="date" id="p-fecha-nacimiento">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="btn-cancelar">Cancelar</button>
        <button class="btn btn-primary" id="btn-guardar">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Modal confirmar eliminación -->
  <div class="modal-overlay" id="modal-eliminar">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3>Eliminar paciente</h3>
        <button class="modal-close" id="modal-eliminar-close">✕</button>
      </div>
      <div class="modal-body">
        <p>¿Estás seguro de que quieres eliminar a <strong id="nombre-eliminar"></strong>? Esta acción no se puede deshacer.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="btn-cancelar-eliminar">Cancelar</button>
        <button class="btn btn-danger" id="btn-confirmar-eliminar">Eliminar</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/pacientes.js"></script>
</body>
</html>
