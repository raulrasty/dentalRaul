<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DentalRaúl – Mi perfil</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/perfil.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div id="sidebar-placeholder"></div>

  <div class="app-layout">
    <main class="main-content">

      <div class="page-title mb-2">Mi perfil</div>

      <div class="perfil-grid">

        <!-- Datos personales -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">Datos personales</span>
            <button class="btn btn-primary btn-sm" id="btn-guardar-perfil">Guardar</button>
          </div>
          <div class="perfil-avatar-section">
            <div class="perfil-avatar" id="perfil-avatar">DR</div>
            <div>
              <div class="perfil-nombre" id="perfil-nombre-display">Cargando...</div>
              <span class="badge" id="perfil-rol-badge"></span>
            </div>
          </div>
          <div class="perfil-form-body">
            <div id="perfil-alert"></div>
            <div class="form-row">
              <div class="form-group">
                <label>Nombre *</label>
                <input type="text" id="p-nombre" placeholder="Nombre">
              </div>
              <div class="form-group">
                <label>Apellidos *</label>
                <input type="text" id="p-apellidos" placeholder="Apellidos">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Email</label>
                <input type="email" id="p-email" disabled style="opacity:0.6;cursor:not-allowed;">
              </div>
              <div class="form-group">
                <label>Teléfono</label>
                <input type="tel" id="p-telefono" placeholder="600 000 000">
              </div>
            </div>
            <div class="form-group">
              <label>Especialidad</label>
              <select id="p-especialidad">
                <option value="">Sin especialidad</option>
                <option value="Odontología general">Odontología general</option>
                <option value="Ortodoncia">Ortodoncia</option>
                <option value="Endodoncia">Endodoncia</option>
                <option value="Periodoncia">Periodoncia</option>
                <option value="Implantología">Implantología</option>
                <option value="Cirugía oral">Cirugía oral</option>
                <option value="Odontopediatría">Odontopediatría</option>
                <option value="Estética dental">Estética dental</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Cambiar contraseña -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">Cambiar contraseña</span>
          </div>
          <div class="pass-form-body">
            <div id="pass-alert"></div>
            <div class="form-group">
              <label>Nueva contraseña</label>
              <div class="input-password">
                <input type="password" id="p-pass-nueva" placeholder="Mínimo 6 caracteres">
                <button type="button" class="toggle-pw" onclick="togglePass('p-pass-nueva')">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
            </div>
            <div class="form-group">
              <label>Confirmar contraseña</label>
              <div class="input-password">
                <input type="password" id="p-pass-confirma" placeholder="Repite la contraseña">
                <button type="button" class="toggle-pw" onclick="togglePass('p-pass-confirma')">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
            </div>
            <button class="btn btn-primary" id="btn-cambiar-pass">Cambiar contraseña</button>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/route-guard.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/perfil.js"></script>
</body>
</html>
